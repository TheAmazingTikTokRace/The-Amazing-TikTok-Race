<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reveal</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #f5f7fb;
    }

    .card {
      width: min(90vw, 420px);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 20px;
      color: rgba(245, 247, 251, 0.72);
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.25);
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: #ffffff;
      color: #0f1115;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .message {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.95rem;
      color: #ff8f8f;
    }

    .secret {
      margin-top: 22px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: none;
      color: #ffffff;
      line-height: 1.6;
    }

    .secret.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Private Access</h1>
    <p>Enter the password to reveal the hidden message.</p>

    <input id="passwordInput" type="password" placeholder="Enter password" />
    <button onclick="checkPassword()">Unlock</button>

    <div id="message" class="message"></div>
    <div id="secret" class="secret">
      This is the hidden text. You can replace this with any message you want.
    </div>
  </div>

  <script>
    const correctPassword = "open-sesame"; // Change this password

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const message = document.getElementById("message");
      const secret = document.getElementById("secret");

      if (input === correctPassword) {
        secret.classList.add("show");
        message.style.color = "#9bffb0";
        message.textContent = "Access granted.";
      } else {
        secret.classList.remove("show");
        message.style.color = "#ff8f8f";
        message.textContent = "Incorrect password.";
      }
    }

    document.getElementById("passwordInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
